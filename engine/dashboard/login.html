<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AstroSIEM - Login</title>
  <style>
    :root {
      --bg-primary: #f8f9fa;
      --bg-secondary: #ffffff;
      --text-primary: #212529;
      --text-secondary: #6c757d;
      --border-color: #dee2e6;
      --accent: #0d6efd;
      --accent-hover: #0b5ed7;
      --error: #dc3545;
      --shadow: 0 4px 16px rgba(0,0,0,0.1);
    }

    .dark {
      --bg-primary: #121212;
      --bg-secondary: #1e1e1e;
      --text-primary: #e0e0e0;
      --text-secondary: #adb5bd;
      --border-color: #404040;
      --shadow: 0 4px 16px rgba(0,0,0,0.4);
    }

    * { 
      box-sizing: border-box; 
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-container {
      background: var(--bg-secondary);
      padding: 40px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .logo {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .subtitle {
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      font-size: 16px;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
    }

    .login-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .login-btn:hover {
      background: var(--accent-hover);
    }

    .login-btn:disabled {
      background: var(--text-secondary);
      cursor: not-allowed;
    }

    .error-message {
      background: rgba(220, 53, 69, 0.1);
      color: var(--error);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .theme-toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-primary);
    }

    .footer {
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  
  <div class="login-container">
    <div class="logo">🔒 AstroSIEM</div>
    <div class="subtitle">Security Information & Event Management</div>
    
    <div class="error-message" id="errorMessage"></div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      
      <button type="submit" class="login-btn" id="loginBtn">Login</button>
    </form>
    
    <div class="footer">
      Contact administrator for access
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    // Check if already authenticated (redirect to dashboard)
    if (window.AstroSIEMAuth.isAuthenticated()) {
      window.location.href = 'dashboard.html';
    }

    // Handle form submission
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const errorMessage = document.getElementById('errorMessage');
      
      // Disable button during login
      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';
      errorMessage.classList.remove('show');
      
      try {
        const result = await window.AstroSIEMAuth.login(username, password);
        
        if (result.success) {
          // Redirect to dashboard
          window.location.href = 'dashboard.html';
        } else {
          // Show error
          errorMessage.textContent = result.message;
          errorMessage.classList.add('show');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Login';
        }
      } catch (err) {
        errorMessage.textContent = 'An error occurred. Please try again.';
        errorMessage.classList.add('show');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Login';
      }
    });

    // Theme toggle
    function toggleTheme() {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
      localStorage.setItem('darkMode', document.body.classList.contains('dark') ? 'true' : 'false');
    }

    // Apply saved theme
    const savedTheme = localStorage.getItem('theme');
    const savedDarkMode = localStorage.getItem('darkMode');
    const shouldUseDark = savedDarkMode !== null
      ? savedDarkMode === 'true'
      : (savedTheme ? savedTheme === 'dark' : true);
    document.body.classList.toggle('dark', shouldUseDark);
  </script>
</body>
</html>
